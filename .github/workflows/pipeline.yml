name: crypto-pipeline
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_fail:
        description: 'Force a data-source failure for demo (crypto.com | coingecko | none)'
        required: false
        default: 'none'
permissions:
  contents: write
concurrency:
  group: crypto-pipeline
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run pipeline
        env:
          FORCE_FAIL: ${{ github.event.inputs.force_fail }}
        run: node scripts/pipeline.js
      - name: Commit data
        run: |
          git config user.name  "life-hq-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "pipeline: refresh $(date -u +%FT%TZ)"
            git push
          fi
