name: crypto-pipeline
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: crypto-pipeline
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run strategy validity tests (gate)
        run: node tests/strategy.test.js
      - name: Run strategist scan
        env:
          COINGECKO_KEY: ${{ secrets.COINGECKO_KEY }}
        run: node scripts/scan.js
      - name: Commit data
        run: |
          git config user.name  "life-hq-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "scan: refresh $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
          fi
